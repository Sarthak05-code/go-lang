<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airplane Booking</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0 0 24px; }

  .plane {
    background: #fff;
    border-radius: 16px;
    padding: 24px 32px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
  .row-label { width: 20px; color: #999; font-size: 13px; }
  .aisle { width: 24px; }

  .seat {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: #4caf50; /* free */
    transition: transform 0.1s ease;
  }
  .seat:hover:not(:disabled) { transform: scale(1.05); }
  .seat:disabled {
    background: #d0433f; /* booked */
    cursor: not-allowed;
  }

  .legend { display: flex; gap: 20px; margin-top: 20px; font-size: 14px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }
  .free { background: #4caf50; }
  .booked { background: #d0433f; }

  dialog {
    border: none;
    border-radius: 12px;
    padding: 24px;
    width: 280px;
  }
  dialog input {
    width: 100%;
    padding: 8px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  dialog button {
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }
  #confirmBtn { background: #4caf50; color: #fff; margin-right: 8px; }
  #cancelBtn { background: #eee; }

  #status { margin-top: 16px; font-size: 14px; min-height: 20px; }
</style>
</head>
<body>

  <h1>✈️ Flight KTM-101 Seat Selection</h1>
  <p class="sub">Click a green seat to book it</p>

  <div class="plane" id="plane"></div>

  <div class="legend">
    <span><span class="dot free"></span> Available</span>
    <span><span class="dot booked"></span> Booked</span>
  </div>

  <div id="status"></div>

  <dialog id="bookDialog">
    <h3 id="dialogSeatLabel">Book seat</h3>
    <input type="text" id="passengerName" placeholder="Passenger name" />
    <div>
      <button id="confirmBtn">Confirm</button>
      <button id="cancelBtn">Cancel</button>
    </div>
  </dialog>

<script>
  const API = "http://localhost:8080";
  const planeEl = document.getElementById("plane");
  const statusEl = document.getElementById("status");
  const dialog = document.getElementById("bookDialog");
  const dialogSeatLabel = document.getElementById("dialogSeatLabel");
  const passengerInput = document.getElementById("passengerName");

  let selectedSeatId = null;

  async function loadSeats() {
    const res = await fetch(`${API}/api/seats`);
    const seats = await res.json();
    renderSeats(seats);
  }

  function renderSeats(seats) {
    planeEl.innerHTML = "";
    const rows = 6;
    const cols = ["A", "B", "C", "D"];

    for (let r = 1; r <= rows; r++) {
      const rowEl = document.createElement("div");
      rowEl.className = "row";

      const label = document.createElement("div");
      label.className = "row-label";
      label.textContent = r;
      rowEl.appendChild(label);

      cols.forEach((c, i) => {
        const seatId = `${r}${c}`;
        const seat = seats.find(s => s.id === seatId);

        const btn = document.createElement("button");
        btn.className = "seat";
        btn.textContent = seatId;
        btn.disabled = seat.booked;
        btn.title = seat.booked ? `Booked by ${seat.passenger}` : "Available";
        btn.onclick = () => openDialog(seatId);
        rowEl.appendChild(btn);

        // aisle gap after seat B
        if (i === 1) {
          const aisle = document.createElement("div");
          aisle.className = "aisle";
          rowEl.appendChild(aisle);
        }
      });

      planeEl.appendChild(rowEl);
    }
  }

  function openDialog(seatId) {
    selectedSeatId = seatId;
    dialogSeatLabel.textContent = `Book seat ${seatId}`;
    passengerInput.value = "";
    dialog.showModal();
  }

  document.getElementById("cancelBtn").onclick = () => dialog.close();

  document.getElementById("confirmBtn").onclick = async () => {
    const name = passengerInput.value.trim();
    if (!name) {
      alert("Please enter a passenger name");
      return;
    }
    try {
      const res = await fetch(`${API}/api/book`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ seatId: selectedSeatId, passenger: name })
      });
      if (!res.ok) {
        const msg = await res.text();
        throw new Error(msg);
      }
      dialog.close();
      statusEl.textContent = `Seat ${selectedSeatId} booked for ${name}.`;
      statusEl.style.color = "#2e7d32";
      loadSeats();
    } catch (err) {
      statusEl.textContent = `Booking failed: ${err.message}`;
      statusEl.style.color = "#c62828";
    }
  };

  loadSeats();
</script>
</body>
</html>
